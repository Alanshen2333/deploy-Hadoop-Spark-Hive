version: "3"

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode

    ports:
      - 19870:9870
      - 19000:9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=test
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark-hive

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode

    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark-hive

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager

    ports:
      - 18088:8088
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864"
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark-hive

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager

    ports:
      - 18042:8042
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark-hive

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver

    ports:
      - 18188:8188
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark-hive

  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master
    hostname: spark-master

    ports:
      - "18080:8080"
      - "17077:7077"
      - "18888:8888"
    volumes:
      - ./spark-hive-site.xml:/spark/conf/hive-site.xml:ro
      - ./jars/postgresql-42.7.4.jar:/spark/jars/postgresql-42.7.4.jar:ro
    environment:
      - INIT_DAEMON_STEP=setup_spark
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
      - YARN_CONF_yarn_resourcemanager_hostname=resourcemanager
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_MASTER_LOG=/spark/logs
    env_file:
      - ./hadoop.env
    extra_hosts:
      - "spark-driver.local:172.18.0.1"
    networks:
      - hadoop-spark-hive

  spark-worker:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker
    hostname: spark-worker

    depends_on:
      - spark-master
    ports:
      - "18081:8081"
    volumes:
      - ./spark-hive-site.xml:/spark/conf/hive-site.xml:ro
      - ./jars/postgresql-42.7.4.jar:/spark/jars/postgresql-42.7.4.jar:ro
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_PORT=8881
      - SPARK_WORKER_WEBUI_PORT=8081
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
      - YARN_CONF_yarn_resourcemanager_hostname=resourcemanager
    env_file:
      - ./hadoop.env
    extra_hosts:
      - "spark-driver.local:172.18.0.1"
    networks:
      - hadoop-spark-hive

  postgres:
    image: postgres:15-alpine
    container_name: postgres

    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive
      - POSTGRES_DB=hive_metastore
    ports:
      - "25432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - hadoop-spark-hive

  hive-server:
    image: bde2020/hive:2.3.2
    container_name: hive-server
    hostname: hive-server

    depends_on:
      - postgres
    ports:
      - "20000:10000"
      - "20002:10002"
    volumes:
      - ./hive-entrypoint.sh:/opt/hive/hive-entrypoint.sh:ro
      - ./jars/postgresql-42.7.4.jar:/opt/hive/lib/postgresql-42.7.4.jar:ro
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 postgres:5432"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://postgres:5432/hive_metastore"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: "org.postgresql.Driver"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: "hive"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: "hive"
      HIVE_SITE_CONF_datanucleus_autoCreateSchema: "true"
      HIVE_SITE_CONF_hive_metastore_schema_verification: "false"
      HIVE_SITE_CONF_hive_metastore_warehouse_dir: "/user/hive/warehouse"
      CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      CORE_CONF_hadoop_http_staticuser_user: "root"
      HDFS_CONF_dfs_webhdfs_enabled: "true"
      HDFS_CONF_dfs_permissions_enabled: "false"
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
    command: ["bash", "/opt/hive/hive-entrypoint.sh"]
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark-hive

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hadoop_historyserver:
  pg_data:

networks:
  hadoop-spark-hive:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1
